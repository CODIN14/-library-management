<template>

    <lightning-card title="📚 Book Explorer">

        <div class="slds-p-around_medium">

            <!-- SEARCH INPUT -->
            <lightning-input
                label="Search Books"
                onchange={handleChange}>
            </lightning-input>

            <!-- BUTTON -->
            <lightning-button
                label="Search"
                onclick={handleSearch}
                disabled={isLoading}
                class="slds-m-top_medium">
            </lightning-button>

            <!-- SPINNER -->
            <template if:true={isLoading}>
                <lightning-spinner alternative-text="Loading"></lightning-spinner>
            </template>

            <!-- ERROR -->
            <template if:true={error}>
                <p class="slds-text-color_error">{error}</p>
            </template>

            <!-- RESULTS TABLE -->
            <template if:true={books}>
                <template for:each={books} for:item="book">
                    <div key={book.title} class="slds-box slds-m-top_small">
                        <p><b>{book.title}</b></p>
                        <p>{book.author}</p>
                    </div>
                </template>
            </template>

        </div>

    </lightning-card>

</template>
