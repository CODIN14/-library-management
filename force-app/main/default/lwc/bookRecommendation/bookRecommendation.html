<template>

    <lightning-card title="📚 Book Explorer">

        <div class="slds-p-around_medium">

            <!-- SEARCH INPUT -->
            <lightning-input
                label="Search Books"
                onchange={handleChange}>
            </lightning-input>

            <!-- BUTTON -->
            <lightning-button
                label="Search"
                onclick={handleSearch}
                disabled={isLoading}
                class="slds-m-top_medium">
            </lightning-button>

            <!-- SPINNER -->
            <template if:true={isLoading}>
                <lightning-spinner alternative-text="Loading"></lightning-spinner>
            </template>

            <!-- ERROR -->
            <template if:true={error}>
                <p class="slds-text-color_error">{error}</p>
            </template>

            <!-- 🔥 DATATABLE (UPDATED PART) -->
            <template if:true={books}>
                <lightning-datatable
                    key-field="title"
                    data={books}
                    columns={columns}
                    onrowaction={handleRowAction}
                    class="slds-m-top_medium">
                </lightning-datatable>
            </template>

        </div>

    </lightning-card>

</template>
