<template>

    <lightning-card title="📚 Library Dashboard">

        <div class="slds-p-around_medium">

            <!-- 🔄 Refresh Button -->
            <div class="slds-m-bottom_medium">
                <lightning-button 
                    label="Refresh" 
                    onclick={handleRefresh}
                    variant="brand">
                </lightning-button>
            </div>

            <!-- 📊 Stats Grid -->
            <div class="slds-grid slds-wrap slds-gutters">

                <!-- Total Books -->
                <div class="slds-col slds-size_1-of-2 slds-m-bottom_medium">
                    <div class="stat-box">
                        <p class="stat-title">Total Books</p>
                        <p class="stat-value">{stats.totalBooks}</p>
                    </div>
                </div>

                <!-- Available -->
                <div class="slds-col slds-size_1-of-2 slds-m-bottom_medium">
                    <div class="stat-box">
                        <p class="stat-title">Available</p>
                        <p class="stat-value available">{stats.availableBooks}</p>
                    </div>
                </div>

                <!-- Borrowed -->
                <div class="slds-col slds-size_1-of-2 slds-m-bottom_medium">
                    <div class="stat-box">
                        <p class="stat-title">Borrowed</p>
                        <p class="stat-value borrowed">{stats.borrowedBooks}</p>
                    </div>
                </div>

                <!-- Overdue -->
                <div class="slds-col slds-size_1-of-2 slds-m-bottom_medium">
                    <div class="stat-box">
                        <p class="stat-title">Overdue</p>
                        <p class="stat-value overdue">{stats.overdueBooks}</p>
                    </div>
                </div>

                <!-- Members -->
                <div class="slds-col slds-size_1-of-1">
                    <div class="stat-box">
                        <p class="stat-title">Total Members</p>
                        <p class="stat-value">{stats.members}</p>
                    </div>
                </div>

            </div>

        </div>

    </lightning-card>

</template>
